---
# SecurityGroup role creates NetworkPolicy resources for traffic enforcement
# 1. Looks up target namespaces based on VirtualNetwork label
# 2. Translates SecurityGroup ingress/egress rules to NetworkPolicy spec
# 3. Creates NetworkPolicy in each target namespace

- name: Include get remote cluster kubeconfig
  ansible.builtin.include_role:
    name: common
    tasks_from: get_remote_cluster_kubeconfig

- name: Extract SecurityGroup configuration
  ansible.builtin.set_fact:
    sg_name: "{{ security_group.metadata.name }}"
    sg_namespace: "{{ security_group.metadata.namespace }}"
    sg_virtual_network: "{{ security_group.spec.virtualNetwork | default('') }}"
    ingress_rules: "{{ security_group.spec.ingressRules | default([]) }}"
    egress_rules: "{{ security_group.spec.egressRules | default([]) }}"

- name: Look up target namespaces for VirtualNetwork
  kubernetes.core.k8s_info:
    kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
    api_version: v1
    kind: Namespace
    label_selectors:
      - "osac.openshift.io/virtual-network={{ sg_virtual_network }}"
  register: namespace_lookup
  when: sg_virtual_network | length > 0

- name: Extract target namespace names
  ansible.builtin.set_fact:
    target_namespaces: "{{ namespace_lookup.resources | map(attribute='metadata.name') | list }}"
  when: sg_virtual_network | length > 0 and namespace_lookup.resources is defined

- name: Display SecurityGroup information
  ansible.builtin.debug:
    msg:
      - "Creating NetworkPolicy for SecurityGroup '{{ sg_name }}'"
      - "VirtualNetwork: {{ sg_virtual_network }}"
      - "Target namespaces: {{ target_namespaces | default([]) }}"
      - "Ingress rules count: {{ ingress_rules | length }}"
      - "Egress rules count: {{ egress_rules | length }}"

- name: Initialize ingress and egress policy rule arrays
  ansible.builtin.set_fact:
    ingress_policy_rules: []
    egress_policy_rules: []

- name: Build ingress rules for NetworkPolicy
  ansible.builtin.set_fact:
    ingress_policy_rules: >-
      {{ ingress_policy_rules + [translated_rule] }}
  vars:
    translated_rule: >-
      {% set result = {} %}
      {% if item.sourceCidr is defined and item.sourceCidr | length > 0 %}
        {% set _ = result.update({'from': [{'ipBlock': {'cidr': item.sourceCidr}}]}) %}
      {% endif %}
      {% if item.protocol != 'icmp' and item.protocol != 'all' %}
        {% if item.portFrom is defined %}
          {% set port_spec = {'protocol': item.protocol | upper, 'port': item.portFrom} %}
          {% if item.portTo is defined and item.portTo != item.portFrom %}
            {% set _ = port_spec.update({'endPort': item.portTo}) %}
          {% endif %}
          {% set _ = result.update({'ports': [port_spec]}) %}
        {% endif %}
      {% endif %}
      {{ result }}
  loop: "{{ ingress_rules }}"

- name: Build egress rules for NetworkPolicy
  ansible.builtin.set_fact:
    egress_policy_rules: >-
      {{ egress_policy_rules + [translated_rule] }}
  vars:
    translated_rule: >-
      {% set result = {} %}
      {% if item.destinationCidr is defined and item.destinationCidr | length > 0 %}
        {% set _ = result.update({'to': [{'ipBlock': {'cidr': item.destinationCidr}}]}) %}
      {% endif %}
      {% if item.protocol != 'icmp' and item.protocol != 'all' %}
        {% if item.portFrom is defined %}
          {% set port_spec = {'protocol': item.protocol | upper, 'port': item.portFrom} %}
          {% if item.portTo is defined and item.portTo != item.portFrom %}
            {% set _ = port_spec.update({'endPort': item.portTo}) %}
          {% endif %}
          {% set _ = result.update({'ports': [port_spec]}) %}
        {% endif %}
      {% endif %}
      {{ result }}
  loop: "{{ egress_rules }}"

- name: Build policyTypes array
  ansible.builtin.set_fact:
    policy_types: >-
      {{
        ([] +
         ((ingress_rules | length > 0) | ternary(['Ingress'], [])) +
         ((egress_rules | length > 0) | ternary(['Egress'], []))
        )
      }}

- name: Create NetworkPolicy in target namespaces
  when: target_namespaces | default([]) | length > 0
  block:
    - name: Build and apply NetworkPolicy for each namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: "sg-{{ sg_name }}"
            namespace: "{{ item }}"
            labels:
              osac.io/managed-by: osac-fulfillment
              osac.io/security-group: "{{ sg_name }}"
              osac.io/virtual-network: "{{ sg_virtual_network }}"
          spec:
            podSelector:
              matchLabels:
                "osac.io/security-group/{{ sg_name }}": ""
            policyTypes: "{{ policy_types }}"
            ingress: "{{ ingress_policy_rules }}"
            egress: "{{ egress_policy_rules }}"
      loop: "{{ target_namespaces }}"

- name: Warn if no target namespaces found
  ansible.builtin.debug:
    msg:
      - "WARNING: No namespaces found for VirtualNetwork '{{ sg_virtual_network }}'"
      - "SecurityGroup '{{ sg_name }}' NetworkPolicy will not be created until Subnets exist"
  when: target_namespaces | default([]) | length == 0
